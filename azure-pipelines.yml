trigger:
  - main

variables:
  # UPDATE TO YOUR SPECIFIC AZURE DEVOPS SERVICE CONNECTION NAME:
  azureServiceConnection: 'your-azure-service-connection-name'
  
  # Infrastructure variables configured from your successful setup
  containerRegistry: 'hybridragacr369.azurecr.io'
  imageRepository: 'hybrid-rag-app'
  webAppName: 'HybridRag'
  resourceGroupName: 'AgenticAI-Rg01'
  dockerfilePath: '$(Build.SourcesDirectory)/Dockerfile'
  tag: '$(Build.BuildId)'

stages:
- stage: Build
  displayName: 'Build and Push'
  jobs:
  - job: Build
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - task: Docker@2
      displayName: 'Log in to ACR'
      inputs:
        command: 'login'
        containerRegistry: '$(azureServiceConnection)'

    - task: Docker@2
      displayName: 'Build and Push Docker Image'
      inputs:
        command: 'buildAndPush'
        repository: '$(imageRepository)'
        dockerfile: '$(dockerfilePath)'
        containerRegistry: '$(azureServiceConnection)'
        tags: |
          $(tag)
          latest

- stage: Deploy
  displayName: 'Deploy to Azure'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: Deploy
    pool:
      vmImage: 'ubuntu-latest'
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureWebAppContainer@1
            displayName: 'Deploy Web App Container'
            inputs:
              azureSubscription: '$(azureServiceConnection)'
              appName: '$(webAppName)'
              imageName: '$(containerRegistry)/$(imageRepository):$(tag)'
              
          - task: AzureCLI@2
            displayName: 'Configure App Settings & Port'
            inputs:
              azureSubscription: '$(azureServiceConnection)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                # Ensure the web app knows to listen on port 8000
                az webapp config appsettings set \
                  --name $(webAppName) \
                  --resource-group $(resourceGroupName) \
                  --settings WEBSITES_PORT="8000"